<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="TaxOS — India's most trusted business tax compliance platform. GST filing, income tax, TDS, AI advisory, and compliance monitoring for business owners." />
    <meta name="keywords" content="GST filing India, business tax software, income tax calculator, GSTR-1 GSTR-3B, TDS compliance, tax deductions India" />
    <meta property="og:title" content="Om Associates" />
    <meta property="og:description" content="End-to-end GST, income tax, and compliance management for Indian business owners. Powered by AI." />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#38BDF8" />
    <!-- Preload fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>Om Associates</title>
    <script>
      // Apply theme before paint to prevent flash
      (function() {
        const stored = localStorage.getItem('taxos-theme');
        const preferred = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        const theme = stored || preferred;
        if (theme === 'dark') document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
